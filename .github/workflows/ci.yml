name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check src tests

      - name: Mypy
        run: uv run mypy src/argus --ignore-missing-imports

      - name: Tests
        run: uv run pytest -q
        env:
          ANTHROPIC_API_KEY: ""
          MODEL_PROVIDER: "anthropic"

services:
  splunk:
    image: splunk/splunk:latest
    container_name: argus-splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_PASSWORD=argus_splunk_1
      - SPLUNK_HTTP_ENABLESSL=true
    ports:
      - "8001:8000"
      - "8089:8089"
    volumes:
      - splunk-data:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "-k", "https://localhost:8089/services/server/info"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

volumes:
  splunk-data:
  splunk-etc:
